<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach Sportif — Sébastien</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>

  <!-- ── APP ───────────────────────────────────────────── -->
  <div id="app">

    <div id="nav-overlay" onclick="closeMobileNav()"></div>
    <div id="mobile-topbar">
      <button id="btn-hamburger" onclick="toggleMobileNav()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="mb-brand">COACH</div>
      <button class="mb-add" onclick="openSessionModal()">+ Séance</button>
    </div>

    <nav id="nav">
      <div class="nav-brand">
        <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="13" stroke="#FA4B00" stroke-width="1.5"/>
          <path d="M8 14 L11 10 L14 14 L17 8 L20 14" stroke="#FA4B00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span>COACH</span>
      </div>

      <div class="nav-profile">
        <div class="nav-avatar">
          <img src="Tools/Gemini_Generated_Image_qo8uqwqo8uqwqo8u.png" alt="Sébastien">
        </div>
        <div class="nav-profile-info">
          <div class="nav-profile-name">Sébastien</div>
        </div>
      </div>

      <ul class="nav-links">
        <li><a href="#dashboard" class="nav-link" data-view="dashboard">
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          Dashboard
        </a></li>
        <li><a href="#seances" class="nav-link" data-view="seances">
          <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Séances
        </a></li>
        <li><a href="#planning" class="nav-link" data-view="planning">
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1.5" y="3" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M5 1.5v3M11 1.5v3M1.5 7h13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Planning
        </a></li>
        <li><a href="#stats" class="nav-link" data-view="stats">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 13 L5 8 L8 10 L11 5 L14 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          Stats
        </a></li>
        <li><a href="#recup" class="nav-link" data-view="recup">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 8.5h3l1.5-3 2.5 6 1.5-3h3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          Récup
        </a></li>
        <li><a href="#import" class="nav-link" data-view="import">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 12v1.5a.5.5 0 00.5.5h11a.5.5 0 00.5-.5V12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Import
        </a></li>
      </ul>

      <div class="nav-theme-toggle">
        <button id="btn-theme" onclick="toggleTheme()" title="Changer le thème">
          <svg id="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span id="theme-label">Light</span>
        </button>
      </div>

      <button id="btn-add-session" class="btn-gold-sm">+ Séance</button>
    </nav>

    <main id="main"></main>

    <div id="modal-overlay" class="hidden">
      <div id="modal">
        <div class="modal-header">
          <h3 id="modal-title">Nouvelle séance</h3>
          <button id="modal-close" class="btn-icon">✕</button>
        </div>
        <form id="session-form">
          <div class="form-grid">
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="f-date" required>
            </div>
            <div class="form-group">
              <label>Type d'activité</label>
              <select id="f-type" required>
                <option value="">— Choisir —</option>
                <option value="rameur">🚣 Rameur</option>
                <option value="velo">🚴 Vélo d'appartement</option>
                <option value="course_ext">🏃 Course extérieure</option>
                <option value="course_tapis">🏃 Course tapis roulant</option>
                <option value="sac">🥊 Sac de frappe</option>
                <option value="corde">⚡ Corde à sauter</option>
                <option value="boxe">🥊 Boxe (cours)</option>
                <option value="renfo">💪 Renforcement</option>
                <option value="cardio">❤️ Cardio</option>
                <option value="autre">— Autre —</option>
              </select>
            </div>
            <div class="form-group">
              <label>Durée (min)</label>
              <input type="number" id="f-duration" min="1" max="300" placeholder="ex: 45">
            </div>
            <div class="form-group">
              <label>Calories</label>
              <input type="number" id="f-calories" min="0" placeholder="ex: 350">
            </div>
            <div class="form-group" id="fg-distance">
              <label>Distance (km)</label>
              <input type="number" id="f-distance" step="0.01" min="0" placeholder="ex: 7.5">
            </div>
            <div class="form-group" id="fg-pace">
              <label>Allure (min/km, ex: 6:30)</label>
              <input type="text" id="f-pace" placeholder="6:30" pattern="[0-9]+:[0-5][0-9]">
            </div>
            <div class="form-group" id="fg-rounds">
              <label>Rounds</label>
              <input type="number" id="f-rounds" min="1" max="20" placeholder="ex: 6">
            </div>
            <div class="form-group">
              <label>FC moyenne (bpm)</label>
              <input type="number" id="f-hr-avg" min="40" max="220" placeholder="ex: 145">
            </div>
            <div class="form-group">
              <label>FC max (bpm)</label>
              <input type="number" id="f-hr-max" min="40" max="220" placeholder="ex: 175">
            </div>
            <div class="form-group full">
              <label>Notes</label>
              <textarea id="f-notes" rows="2" placeholder="Ressenti, conditions, variantes…"></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" id="btn-delete-session" class="btn-danger hidden">Supprimer</button>
            <div>
              <button type="button" id="btn-cancel" class="btn-ghost">Annuler</button>
              <button type="submit" class="btn-gold">Enregistrer</button>
            </div>
          </div>
        </form>
      </div>
    </div>

  </div><!-- /#app -->

  <script src="app.js?v=7"></script>
</body>
</html>
